name: Build and Release

# Triggers only when you push a version tag like v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the full repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Read the version from the tag (e.g. v1.0.0)
      - name: Get version tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $VERSION"
            echo "Expected: vX.Y.Z"
            exit 1
          fi

      # 3. Build release packages
      - name: Build release zips
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          zip -r "sentinel-core-only-${VERSION}.zip"     log-sentinel/
          zip -r "sentinel-full-bundle-${VERSION}.zip"   log-sentinel/ apps/ infra/ docker-compose.yml run-stack.ps1 run-stack.bat run-stack.sh README.md

          echo "Built packages:"
          ls -lh *.zip

      # 4. Create the GitHub Release and attach the zips
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "${{ steps.version.outputs.VERSION }} — Behavioral Threat Hunting"
          body: |
            ## Behavioral Threat Hunting ${{ steps.version.outputs.VERSION }}

            Real-time web attack detection with integrated Portal UI/API customization workflow.

            ---

            ## Download

            | Package | Contents | Who it's for |
            |---|---|---|
            | `sentinel-core-only-${{ steps.version.outputs.VERSION }}.zip` | Log Sentinel only | Just want the detector |
            | `sentinel-full-bundle-${{ steps.version.outputs.VERSION }}.zip` | Core + Portal + Observability configs | Fresh install |

            ---

            ## Quick Start

            **Core only:**
            ```bash
            cd log-sentinel/
            pip install -r requirements.txt
            python sentinel.py
            ```

            **Full integrated stack:**
            ```bash
            docker compose --profile full up --build
            # Open Portal UI: http://localhost:3001
            ```

            ---

            ## Requirements
            - Python 3.8+
            - Docker Desktop (recommended for full stack)
          files: |
            sentinel-core-only-${{ steps.version.outputs.VERSION }}.zip
            sentinel-full-bundle-${{ steps.version.outputs.VERSION }}.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
