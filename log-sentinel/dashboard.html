<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Sentinel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #0f0f1e;
    --bg2:       #1a1a2e;
    --bg3:       #252540;
    --border:    #3a3a52;
    --accent:    #00d9ff;
    --accent-dark: #0a9fb5;
    --red:       #ff4757;
    --red-dark:  #d63031;
    --yellow:    #ffa502;
    --cyan:      #00e5ff;
    --purple:    #a366ff;
    --green:     #2ed573;
    --dim:       #4a5a7a;
    --text:      #e8eef7;
    --text-dim:  #8899bb;
    --shadow:    rgba(0, 0, 0, 0.3);
    --glow:      rgba(0, 217, 255, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, var(--bg) 0%, #1a1a3e 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* Subtle animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(163, 102, 255, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline overlay - more subtle */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0, 0, 0, 0.03) 3px,
      rgba(0, 0, 0, 0.03) 6px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg2) 0%, rgba(26, 26, 46, 0.8) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px var(--shadow);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 16px;
    font-weight: 600;
    position: relative;
    border-radius: 8px;
    background: rgba(0, 217, 255, 0.08);
    box-shadow: 0 0 20px var(--glow);
    transition: all 0.3s ease;
  }

  .logo-mark:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px var(--glow);
  }

  .logo-mark::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid var(--accent);
    opacity: 0.3;
    border-radius: 4px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
    font-weight: 500;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 600;
    padding: 8px 14px;
    background: rgba(46, 213, 115, 0.1);
    border: 1px solid rgba(46, 213, 115, 0.3);
    border-radius: 6px;
  }

  .pulse {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
    50% { opacity: 0.4; box-shadow: 0 0 4px var(--green); }
  }

  .last-updated {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    padding: 6px 12px;
    background: var(--bg3);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  /* Layout */
  .main {
    padding: 32px 32px;
    display: grid;
    gap: 24px;
    max-width: 1600px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Stat cards row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .stat-card {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px var(--shadow);
  }

  .stat-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 25px var(--glow);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .stat-card.total::before  { background: linear-gradient(90deg, var(--accent), var(--cyan)); }
  .stat-card.critical::before { background: linear-gradient(90deg, var(--red), var(--red-dark)); }
  .stat-card.warning::before  { background: linear-gradient(90deg, var(--yellow), #ff7b54); }
  .stat-card.ips::before     { background: linear-gradient(90deg, var(--purple), #7b6ff7); }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .stat-value {
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1px;
    transition: transform 0.3s ease;
  }

  .stat-card:hover .stat-value {
    transform: scale(1.05);
  }

  .stat-card.total .stat-value   { color: var(--accent); }
  .stat-card.critical .stat-value { color: var(--red); }
  .stat-card.warning .stat-value  { color: var(--yellow); }
  .stat-card.ips .stat-value      { color: var(--purple); }

  /* Middle row */
  .mid-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  /* Panel */
  .panel {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px var(--shadow);
    transition: all 0.3s ease;
  }

  .panel:hover {
    border-color: var(--accent);
    box-shadow: 0 8px 25px var(--glow);
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0, 0, 0, 0.2);
  }

  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }

  .panel-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  /* Attack type bars */
  .type-list {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .type-row {
    display: grid;
    grid-template-columns: 180px 1fr 50px;
    align-items: center;
    gap: 12px;
    padding: 8px;
    border-radius: 6px;
    transition: background 0.2s ease;
  }

  .type-row:hover {
    background: rgba(0, 217, 255, 0.08);
  }

  .type-name {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }

  .type-bar-bg {
    height: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .type-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 2px;
  }

  .type-bar-fill.red    { background: linear-gradient(90deg, var(--red), var(--red-dark)); }
  .type-bar-fill.yellow { background: linear-gradient(90deg, var(--yellow), #ff7b54); }

  .type-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    text-align: right;
    font-weight: 600;
  }

  /* Top IPs */
  .ip-list {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ip-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    transition: all 0.2s ease;
  }

  .ip-row:hover {
    border-color: var(--accent);
    background: rgba(0, 217, 255, 0.05);
    transform: translateX(4px);
  }

  .ip-addr { color: var(--accent); font-weight: 600; }

  .ip-count {
    background: var(--accent);
    color: var(--bg);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  /* Timeline */
  .timeline-panel {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 15px var(--shadow);
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .timeline-panel:hover {
    border-color: var(--accent);
    box-shadow: 0 8px 25px var(--glow);
  }

  .timeline-chart {
    padding: 24px;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 140px;
  }

  .timeline-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    height: 100%;
    justify-content: flex-end;
    transition: transform 0.2s ease;
  }

  .timeline-bar-wrap:hover {
    transform: scale(1.05);
  }

  .timeline-bar {
    width: 100%;
    background: linear-gradient(180deg, var(--cyan), var(--accent));
    opacity: 0.8;
    min-height: 3px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    border-radius: 2px;
  }

  .timeline-bar:hover {
    opacity: 1;
    box-shadow: 0 0 12px var(--glow);
  }

  .timeline-bar:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg3);
    border: 1px solid var(--accent);
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    z-index: 10;
    border-radius: 4px;
    box-shadow: 0 4px 12px var(--shadow);
    font-weight: 600;
  }

  .timeline-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    white-space: nowrap;
    font-weight: 500;
  }

  /* Alerts feed */
  .alerts-panel {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px var(--shadow);
    transition: all 0.3s ease;
  }

  .alerts-panel:hover {
    border-color: var(--accent);
    box-shadow: 0 8px 25px var(--glow);
  }

  .alerts-feed {
    max-height: 460px;
    overflow-y: auto;
  }

  .alerts-feed::-webkit-scrollbar { width: 6px; }
  .alerts-feed::-webkit-scrollbar-track { background: var(--bg); }
  .alerts-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .alerts-feed::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .alert-row {
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: start;
    animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .alert-row:hover {
    background: rgba(0, 217, 255, 0.08);
    border-left: 3px solid var(--accent);
    padding-left: 17px;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .severity-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border: 1.5px solid;
    white-space: nowrap;
    border-radius: 4px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .severity-badge.CRITICAL {
    color: var(--red);
    border-color: var(--red);
    background: rgba(255, 71, 87, 0.12);
  }

  .severity-badge.WARNING {
    color: var(--yellow);
    border-color: var(--yellow);
    background: rgba(255, 165, 2, 0.12);
  }



  .alert-type {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .alert-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .alert-meta span { color: var(--text-dim); }
  .alert-meta .ip  { color: var(--accent); }

  .alert-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    font-weight: 500;
  }

  /* Empty state */
  .empty {
    padding: 48px 20px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .alert-type {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    letter-spacing: 0.3px;
  }

  /* Responsive */
  @media (max-width: 1200px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .mid-row   { grid-template-columns: 1fr; }
  }

  @media (max-width: 768px) {
    .main { padding: 16px; }
    .stats-row { grid-template-columns: 1fr; gap: 12px; }
    .stat-value { font-size: 36px; }
    .header { padding: 16px; gap: 10px; }
    .header-right { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">S</div>
    <div>
      <div class="logo-text">Log Sentinel</div>
      <div class="logo-sub">Network Intrusion Detection</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-indicator">
      <div class="pulse"></div>
      MONITORING ACTIVE
    </div>
    <div class="last-updated" id="lastUpdated">--</div>
  </div>
</header>

<div class="main">

  <!-- Stat cards -->
  <div class="stats-row">
    <div class="stat-card total">
      <div class="stat-label">Total Alerts</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card critical">
      <div class="stat-label">Critical</div>
      <div class="stat-value" id="statCritical">0</div>
    </div>
    <div class="stat-card warning">
      <div class="stat-label">Warning</div>
      <div class="stat-value" id="statWarning">0</div>
    </div>
    <div class="stat-card ips">
      <div class="stat-label">Unique IPs</div>
      <div class="stat-value" id="statIPs">0</div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline-panel panel">
    <div class="panel-header">
      <div class="panel-title">Activity Timeline</div>
      <div class="panel-count">last 24 hours</div>
    </div>
    <div class="timeline-chart" id="timeline">
      <div class="empty">No timeline data</div>
    </div>
  </div>

  <!-- Mid row: attack types + top IPs -->
  <div class="mid-row">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Attack Types</div>
        <div class="panel-count" id="typeCount">--</div>
      </div>
      <div class="type-list" id="typeList">
        <div class="empty">No data</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Top Attacking IPs</div>
        <div class="panel-count" id="ipCount">--</div>
      </div>
      <div class="ip-list" id="ipList">
        <div class="empty">No data</div>
      </div>
    </div>
  </div>

  <!-- Live alerts feed -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Correlated Incidents</div>
      <div class="panel-count" id="incidentCount">--</div>
    </div>
    <div class="ip-list" id="incidentList">
      <div class="empty">No incidents yet</div>
    </div>
  </div>

  <!-- Live alerts feed -->
  <div class="alerts-panel panel">
    <div class="panel-header">
      <div class="panel-title">Live Alert Feed</div>
      <div class="panel-count" id="alertCount">--</div>
    </div>
    <div class="alerts-feed" id="alertsFeed">
      <div class="empty">Waiting for alerts...</div>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:8888';

  async function fetchStats() {
    const res = await fetch(`${API}/api/stats`);
    return res.json();
  }

  async function fetchAlerts() {
    const res = await fetch(`${API}/api/alerts`);
    return res.json();
  }

  async function fetchIncidents() {
    const res = await fetch(`${API}/api/incidents`);
    return res.json();
  }

  function renderStats(stats) {
    document.getElementById('statTotal').textContent    = stats.total;
    document.getElementById('statCritical').textContent = stats.critical;
    document.getElementById('statWarning').textContent  = stats.warning;
    document.getElementById('statIPs').textContent      = stats.top_ips.length;
  }

  function renderTimeline(stats) {
    const el = document.getElementById('timeline');
    if (!stats.timeline.length) return;

    const max = Math.max(...stats.timeline.map(t => t.count), 1);

    el.innerHTML = stats.timeline.map(t => {
      const pct = Math.max((t.count / max) * 72, 2);
      const label = t.hour.slice(11); // HH
      return `
        <div class="timeline-bar-wrap">
          <div class="timeline-bar" style="height:${pct}px" data-tip="${t.hour}: ${t.count} alerts"></div>
          <div class="timeline-label">${label}</div>
        </div>`;
    }).join('');
  }

  function renderTypes(stats) {
    const el = document.getElementById('typeList');
    document.getElementById('typeCount').textContent = `${stats.attack_types.length} types`;

    if (!stats.attack_types.length) {
      el.innerHTML = '<div class="empty">No data</div>';
      return;
    }

    const max = Math.max(...stats.attack_types.map(t => t.count), 1);

    const colorMap = {
      'SQL Injection':          'red',
      'Cross-Site Scripting':   'red',
      'Command Injection':      'red',
      'Path Traversal':         'red',
      'Rate Limit Exceeded':    'yellow',
      'Security Scanner':       'yellow',
      '404 Spam (Reconnaissance)': 'yellow'
    };

    el.innerHTML = stats.attack_types.map(t => {
      const pct = (t.count / max) * 100;
      const cls = colorMap[t.type] || '';
      return `
        <div class="type-row">
          <div class="type-name">${t.type}</div>
          <div class="type-bar-bg">
            <div class="type-bar-fill ${cls}" style="width:${pct}%"></div>
          </div>
          <div class="type-count">${t.count}</div>
        </div>`;
    }).join('');
  }

  function renderIPs(stats) {
    const el = document.getElementById('ipList');
    document.getElementById('ipCount').textContent = `${stats.top_ips.length} IPs`;

    if (!stats.top_ips.length) {
      el.innerHTML = '<div class="empty">No data</div>';
      return;
    }

    el.innerHTML = stats.top_ips.map(ip => `
      <div class="ip-row">
        <span class="ip-addr">${ip.ip}</span>
        <span class="ip-count">${ip.count} hits</span>
      </div>`).join('');
  }

  function renderIncidents(incidents) {
    const el = document.getElementById('incidentList');
    document.getElementById('incidentCount').textContent = `${incidents.length} incidents`;

    if (!incidents.length) {
      el.innerHTML = '<div class="empty">No incidents yet</div>';
      return;
    }

    el.innerHTML = incidents.slice(0, 10).map(inc => {
      const topTypes = (inc.types || []).slice(0, 2).join(', ');
      const reason = (inc.reasons || [])[0] || 'correlated-activity';
      return `
        <div class="ip-row">
          <span class="ip-addr">${inc.ip} · ${inc.severity}</span>
          <span class="ip-count">${inc.alert_count} alerts · ${topTypes || 'mixed'} · score ${inc.max_score}</span>
        </div>
        <div class="alert-meta" style="margin: -6px 16px 10px 16px;">${reason}</div>`;
    }).join('');
  }

  function renderAlerts(alerts) {
    const el = document.getElementById('alertsFeed');
    document.getElementById('alertCount').textContent = `${alerts.length} alerts`;

    if (!alerts.length) {
      el.innerHTML = '<div class="empty">Waiting for alerts...</div>';
      return;
    }

    el.innerHTML = alerts.map(a => {
      const meta = [];
      if (a.ip)        meta.push(`<span class="ip">${a.ip}</span>`);
      if (a.path)      meta.push(`<span>${a.path.slice(0, 60)}${a.path.length > 60 ? '...' : ''}</span>`);
      if (a.pattern)   meta.push(`<span>pattern: ${a.pattern}</span>`);
      if (a.useragent) meta.push(`<span>ua: ${a.useragent.slice(0, 40)}</span>`);
      if (a.score)     meta.push(`<span>score: ${a.score}</span>`);
      if (a.reasons && a.reasons.length) meta.push(`<span>reason: ${a.reasons[0]}</span>`);
      if (a.requests)  meta.push(`<span>${a.requests} reqs/${a.window}s</span>`);
      if (a.count)     meta.push(`<span>${a.count} 404s</span>`);

      return `
        <div class="alert-row">
          <div class="severity-badge ${a.severity}">${a.severity}</div>
          <div class="alert-body">
            <div class="alert-type">${a.type}</div>
            <div class="alert-meta">${meta.join('')}</div>
          </div>
          <div class="alert-time">${a.time ? a.time.slice(11) : '--'}</div>
        </div>`;
    }).join('');
  }

  function updateTimestamp() {
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      now.toTimeString().slice(0, 8);
  }

  async function refresh() {
    try {
      const [stats, alerts, incidents] = await Promise.all([fetchStats(), fetchAlerts(), fetchIncidents()]);
      renderStats(stats);
      renderTimeline(stats);
      renderTypes(stats);
      renderIPs(stats);
      renderIncidents(incidents);
      renderAlerts(alerts);
      updateTimestamp();
    } catch (e) {
      document.getElementById('lastUpdated').textContent = 'server offline';
    }
  }

  // Initial load + poll every 5 seconds
  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
