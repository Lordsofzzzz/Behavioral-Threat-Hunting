# Log Sentinel Configuration

# Log file to monitor
log_file: /var/log/nginx/access.log

# Alert output
alert_log: /app/data/alerts.log
console_output: true

# Detection settings
enable_sqli_detection: true
enable_xss_detection: true
enable_traversal_detection: true
enable_cmdi_detection: true
enable_scanner_detection: true

# Rate limiting (requests per minute per IP)
rate_limit_enabled: true
rate_limit_threshold: 60
rate_limit_window: 60  # seconds

# 404 spam detection
enable_404_detection: true
max_404_per_minute: 10

# Alert levels
# 0 = INFO, 1 = WARNING, 2 = CRITICAL
min_alert_level: 1

# Duplicate alert suppression
dedup_enabled: true
dedup_window_seconds: 30

# Console rendering limits
max_path_length: 200

# Behavioral anomaly detection (Phase 2 unique factor)
enable_behavioral_detection: true
behavior_baseline_min_requests: 20
behavior_rate_spike_multiplier: 2.5
behavior_new_endpoint_min_history: 15
behavior_new_ua_min_history: 15

# Whitelist IPs (comma-separated, no detection on these)
whitelist_ips: 127.0.0.1,::1

# Auto-blocking - in progress
#auto_block_enabled: false
#block_duration: 3600  # seconds
