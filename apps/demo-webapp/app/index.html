<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Behavioral Threat Hunting Demo App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 2rem;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        max-width: 900px;
        margin: 0 auto;
        background: #111827;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 2rem;
      }
      code {
        background: #1e293b;
        padding: 0.15rem 0.35rem;
        border-radius: 6px;
      }
      a { color: #60a5fa; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Behavioral Threat Hunting Demo Web App</h1>
      <p>This is a simple demo application used to generate access logs.</p>
      <p>Useful paths:</p>
      <ul>
        <li><code>/</code></li>
        <li><code>/login</code></li>
        <li><code>/admin</code></li>
        <li><code>/search?q=test</code></li>
        <li><code>/api</code></li>
      </ul>
      <p>
        Traffic from the log generator will be sent here and analyzed by the
        Sentinel Engine.
      </p>
    </div>
  </body>
</html>
