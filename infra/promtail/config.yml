server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: demo-nginx-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: demo-nginx
          service: demo-webapp
          log_type: access
          __path__: /var/log/nginx/access.log